<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15120a">
<title>Forkball Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf8f0; --surface:#fffef9; --border:#ddd5c5; --border-dark:#b8ae9e;
  --text:#15120a; --text-muted:#5a5040; --text-dim:#a09080; --header-bg:#15120a;
  --accent:#0ab5a8; --accent-light:#d0f7f5;
  --move:#1a6ef5; --move-light:#dce9ff;
  --catalyst:#f5620a; --catalyst-light:#ffe0d0;
  --level:#8b1af5; --level-light:#eddcff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito Sans',sans-serif;font-weight:600;color:var(--text);
  background-color:var(--bg);
  background-image:radial-gradient(circle,#c4bdb0 1.5px,transparent 1.5px);
  background-size:20px 20px;background-attachment:fixed;
  -webkit-font-smoothing:antialiased;padding-bottom:50px;
}
#shapes-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ms{position:absolute;opacity:0;transform:scale(0.4) rotate(var(--r,0deg));
  transition:opacity .45s cubic-bezier(.34,1.56,.64,1),transform .45s cubic-bezier(.34,1.56,.64,1);}
.ms.visible{opacity:1;transform:scale(1) rotate(var(--r,0deg));}

.header{position:sticky;top:0;z-index:100;background:var(--header-bg);
  border-bottom:6px solid var(--accent);padding:14px 20px 12px;}
.logo{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--accent);line-height:1;}
.logo span{color:#fff;font-weight:400;}
.sub{color:var(--text-dim);font-size:12px;font-weight:700;margin-top:4px;
  text-transform:uppercase;letter-spacing:.5px;}

.main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:18px 16px;}

.qbar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;}
.quote{flex:0 0 auto;background:var(--surface);border:2px solid var(--border);
  border-radius:11px;padding:6px 11px;font-size:12px;font-weight:800;white-space:nowrap;}
.quote .up{color:#00a86b;} .quote .down{color:#e8234a;}

.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn{border-radius:11px;font-family:'Nunito Sans',sans-serif;font-weight:800;
  border:2px solid var(--border-dark);background:var(--surface);color:var(--text);
  padding:7px 13px;font-size:13px;cursor:pointer;}
.btn.active{background:var(--accent);border-color:var(--accent);color:#063d39;}

.card-wrap{position:relative;margin-bottom:16px;}
.card-shadow{position:absolute;top:5px;left:5px;right:-5px;bottom:-5px;
  background:var(--border-dark);border-radius:16px;z-index:0;}
.card{position:relative;z-index:1;background:var(--surface);
  border:2.5px solid var(--border);border-left-width:7px;border-radius:16px;
  padding:14px 15px;transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.card:hover{transform:translate(-2px,-2px);}
.card.move{border-left-color:var(--move);}
.card.catalyst{border-left-color:var(--catalyst);}
.card.level{border-left-color:var(--level);}

.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.tk{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;}
.badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;
  text-transform:uppercase;letter-spacing:.5px;}
.b-move{background:var(--move-light);color:var(--move);}
.b-catalyst{background:var(--catalyst-light);color:var(--catalyst);}
.b-level{background:var(--level-light);color:var(--level);}
.held{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;
  background:var(--accent-light);color:var(--accent);text-transform:uppercase;letter-spacing:.5px;}
.reason{font-size:14px;line-height:1.4;color:var(--text);margin-bottom:10px;}

.heads{margin:8px 0;}
.heads a{display:block;font-size:12px;color:var(--text-muted);text-decoration:none;
  padding:3px 0;line-height:1.35;border-bottom:1px solid var(--border);}
.heads a:last-child{border-bottom:none;}
.heads a:hover{color:var(--accent);}
.src{font-weight:800;color:var(--text-dim);font-size:10px;text-transform:uppercase;}

.paste{background:var(--header-bg);color:#e8e2d4;border-radius:11px;
  padding:11px 12px;font-family:ui-monospace,Menlo,monospace;font-size:11px;
  line-height:1.5;white-space:pre-wrap;word-break:break-word;margin-top:8px;
  max-height:160px;overflow:auto;}
.copy{margin-top:8px;width:100%;border-radius:11px;border:2px solid var(--accent);
  background:var(--accent);color:#063d39;font-family:'Nunito Sans',sans-serif;
  font-weight:800;font-size:14px;padding:9px;cursor:pointer;}
.copy.done{background:#00a86b;border-color:#00a86b;color:#fff;}

.empty{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:15px;}

.section-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;
  text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);
  margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--border);}

.brief-wrap{position:relative;margin-bottom:8px;}
.brief-shadow{position:absolute;top:5px;left:5px;right:-5px;bottom:-5px;
  background:var(--border-dark);border-radius:16px;z-index:0;}
.brief{position:relative;z-index:1;background:var(--surface);
  border:2.5px solid var(--accent);border-radius:16px;padding:16px 17px;}
.brief-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.brief-head .label{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;
  color:var(--accent);text-transform:uppercase;letter-spacing:.5px;}
.brief-head .date{margin-left:auto;font-size:12px;font-weight:700;color:var(--text-dim);}
.brief-body{font-size:14.5px;line-height:1.55;color:var(--text);white-space:pre-wrap;}
.brief-body strong{font-weight:800;}
.deep-tag{display:inline-block;margin-top:10px;font-size:10px;font-weight:800;
  padding:3px 8px;border-radius:7px;background:var(--accent-light);color:var(--accent);
  text-transform:uppercase;letter-spacing:.5px;}

.tabs{display:flex;gap:8px;margin-bottom:18px;}
.tab{flex:1;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:14px;border:2.5px solid var(--border-dark);background:var(--surface);
  color:var(--text-muted);padding:10px;cursor:pointer;text-transform:uppercase;
  letter-spacing:.5px;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#063d39;}

.cap-row{display:flex;align-items:center;gap:10px;background:var(--surface);
  border:2px solid var(--border);border-left-width:6px;border-radius:12px;
  padding:10px 13px;margin-bottom:9px;}
.cap-row.buy{border-left-color:var(--bull,#00a86b);}
.cap-row.sell{border-left-color:var(--bear,#e8234a);}
.cap-main{flex:1;min-width:0;}
.cap-pol{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;}
.cap-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px;}
.cap-tk{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;
  white-space:nowrap;}
.cap-tk small{display:block;font-size:10px;font-weight:700;text-align:right;
  text-transform:uppercase;letter-spacing:.5px;}
.cap-tk small.buy{color:var(--bull,#00a86b);} .cap-tk small.sell{color:var(--bear,#e8234a);}
.cap-amt{font-size:11px;color:var(--text-dim);white-space:nowrap;text-align:right;}
.cap-floor{font-size:11px;color:var(--text-dim);margin-bottom:12px;font-weight:700;}
.cap-row.flagged{border-left-color:var(--catalyst);background:var(--catalyst-light);}
.cap-flag{display:inline-block;margin-top:5px;font-size:10px;font-weight:800;
  padding:3px 8px;border-radius:7px;background:var(--catalyst);color:#fff;
  text-transform:uppercase;letter-spacing:.5px;}
.cap-flag-note{font-size:11px;color:var(--catalyst);font-weight:700;margin-top:3px;}

/* --- Restructured Capitol tab --- */
.cap-section-label{font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;
  text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);
  margin:22px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--border);}
.cap-section-label:first-child{margin-top:4px;}
.cap-section-label .n{color:var(--catalyst);}

/* Overlap cards (pinned section) — roomier than firehose rows */
.ov-card-wrap{position:relative;margin-bottom:14px;}
.ov-card-shadow{position:absolute;top:5px;left:5px;right:-5px;bottom:-5px;
  background:var(--border-dark);border-radius:14px;z-index:0;}
.ov-card{position:relative;z-index:1;background:var(--catalyst-light);
  border:2.5px solid var(--catalyst);border-left-width:7px;border-radius:14px;
  padding:12px 14px;}
.ov-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px;}
.ov-sector{font-size:10px;font-weight:800;padding:3px 9px;border-radius:7px;
  background:var(--catalyst);color:#fff;text-transform:uppercase;letter-spacing:.5px;}
.ov-side{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;
  text-transform:uppercase;letter-spacing:.5px;}
.ov-side.buy{background:#d4f5e9;color:#00a86b;} .ov-side.sell{background:#ffdde3;color:#e8234a;}
.ov-pol{font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;margin-bottom:2px;}
.ov-pol .ch{font-weight:600;color:var(--text-dim);font-size:12px;}
.ov-tk{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;color:var(--catalyst);}
.ov-sub{font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.4;}
.ov-note{font-size:11.5px;color:var(--catalyst);font-weight:700;margin-top:6px;line-height:1.35;}
.cap-empty{background:var(--surface);border:2px dashed var(--border-dark);
  border-radius:12px;padding:16px;font-size:13px;color:var(--text-muted);
  line-height:1.45;text-align:center;}

/* Collapsible charts panel */
.charts-toggle{width:100%;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:2.5px solid var(--border-dark);border-radius:12px;
  padding:11px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;
  font-size:14px;color:var(--text);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.charts-toggle .chev{margin-left:auto;transition:transform .2s;font-size:12px;color:var(--text-dim);}
.charts-toggle.open .chev{transform:rotate(90deg);}
.charts-panel{display:none;margin-bottom:6px;}
.charts-panel.open{display:block;}
.win-toggle{display:flex;gap:8px;margin-bottom:12px;}
.win-btn{flex:1;border-radius:11px;font-family:'Nunito Sans',sans-serif;font-weight:800;
  border:2px solid var(--border-dark);background:var(--surface);color:var(--text-muted);
  padding:7px;font-size:13px;cursor:pointer;}
.win-btn.active{background:var(--accent);border-color:var(--accent);color:#063d39;}
.charts-row{display:flex;gap:10px;}
.chart-box{flex:1;min-width:0;background:var(--surface);border:2.5px solid var(--border);
  border-radius:14px;padding:11px 10px 9px;}
.chart-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;
  text-transform:uppercase;letter-spacing:.4px;color:var(--text);margin-bottom:2px;}
.chart-sub{font-size:10px;color:var(--text-dim);font-weight:700;margin-bottom:8px;line-height:1.3;}
.chart-box svg{width:100%;height:auto;display:block;}
.chart-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px;font-size:10px;font-weight:700;color:var(--text-muted);}
.chart-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:3px;vertical-align:-1px;}
.chart-empty{font-size:11px;color:var(--text-dim);text-align:center;padding:24px 6px;}
</style>
</head>
<body>
<div id="shapes-layer" aria-hidden="true"></div>

<div class="header">
  <div class="logo">FORKBALL <span>Signals</span></div>
  <div class="sub" id="subline">Loading…</div>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" id="tab-market" onclick="switchTab('market')">Market</button>
    <button class="tab" id="tab-capitol" onclick="switchTab('capitol')">Capitol Trades</button>
  </div>

  <div id="view-market">
    <div class="qbar" id="qbar"></div>
    <div id="brief"></div>
    <div class="section-label" id="alerts-label" style="display:none">Intraday Alerts</div>
    <div class="controls" id="controls"></div>
    <div id="feed"></div>
  </div>

  <div id="view-capitol" style="display:none">
    <div id="cap-overlaps"></div>
    <div id="cap-charts"></div>
    <div id="cap-list"></div>
  </div>
</div>

<script>
const TYPE_LABEL = {move:'Price Move', catalyst:'Catalyst', level:'Level Cross'};
let HISTORY = [];
let scanIndex = 0;

async function load(){
  await loadBrief();
  try{
    const res = await fetch('recommendations.json?t=' + Date.now());
    HISTORY = (await res.json()).history || [];
  }catch(e){
    document.getElementById('subline').textContent = 'No scans yet';
    document.getElementById('feed').innerHTML =
      '<div class="empty">No scans have run yet. Once the GitHub Action fires, alerts appear here.</div>';
    return;
  }
  if(!HISTORY.length){
    document.getElementById('subline').textContent = 'No scans yet';
    document.getElementById('feed').innerHTML =
      '<div class="empty">No scans recorded yet.</div>';
    return;
  }
  document.getElementById('alerts-label').style.display='block';
  buildControls(); render();
}

async function loadBrief(){
  const wrap=document.getElementById('brief');
  let hist=[];
  try{
    const res=await fetch('brief.json?t='+Date.now());
    hist=(await res.json()).history||[];
  }catch(e){ return; }
  if(!hist.length){ return; }
  const b=hist[0];
  // Render **bold** markdown lightly; escape first.
  let body=esc(b.brief||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  wrap.innerHTML=`
    <div class="brief-wrap">
      <div class="brief-shadow"></div>
      <div class="brief">
        <div class="brief-head">
          <span class="label">📰 Daily Brief</span>
          <span class="date">${esc(b.date||'')}</span>
        </div>
        <div class="brief-body">${body}</div>
        ${b.deep_look?`<span class="deep-tag">Deep look: ${esc(b.deep_look)}</span>`:''}
      </div>
    </div>`;
}

function buildControls(){
  const c = document.getElementById('controls'); c.innerHTML='';
  HISTORY.slice(0,6).forEach((scan,i)=>{
    const b=document.createElement('button');
    b.className='btn'+(i===scanIndex?' active':'');
    const t=new Date(scan.generated_at);
    const n=(scan.alerts||[]).length;
    b.textContent = (i===0?'Latest':t.toLocaleString([],{month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit'})) + (n?` (${n})`:'');
    b.onclick=()=>{scanIndex=i;buildControls();render();};
    c.appendChild(b);
  });
}

function render(){
  const scan=HISTORY[scanIndex];
  const t=new Date(scan.generated_at);
  document.getElementById('subline').textContent =
    t.toLocaleString([],{weekday:'short',hour:'numeric',minute:'2-digit'})+' ET scan';

  const qbar=document.getElementById('qbar'); qbar.innerHTML='';
  Object.values(scan.quotes||{}).forEach(q=>{
    const pct=q.percent==null?'':`<span class="${q.percent>=0?'up':'down'}">${q.percent>=0?'+':''}${q.percent.toFixed(2)}%</span>`;
    const el=document.createElement('div'); el.className='quote';
    el.innerHTML=`${q.ticker} $${(q.price||0).toFixed(2)} ${pct}`;
    qbar.appendChild(el);
  });

  const feed=document.getElementById('feed');
  const alerts=scan.alerts||[];
  if(!alerts.length){
    feed.innerHTML='<div class="empty">Quiet scan — nothing tripped a rule. Quotes above are current.</div>';
    return;
  }
  feed.innerHTML=alerts.map(cardHTML).join('');
  // wire copy buttons
  document.querySelectorAll('.copy').forEach(btn=>{
    btn.onclick=()=>{
      const txt=decodeURIComponent(btn.dataset.paste);
      navigator.clipboard.writeText(txt).then(()=>{
        btn.textContent='✓ Copied — paste into Claude';
        btn.classList.add('done');
        setTimeout(()=>{btn.textContent='Copy paste-block for Claude';btn.classList.remove('done');},2500);
      });
    };
  });
}

function cardHTML(a){
  const heads=(a.headlines||[]).map(h=>
    `<a href="${esc(h.url||'#')}" target="_blank" rel="noopener"><span class="src">${esc(h.source||'')}</span> ${esc(h.headline||'')}</a>`
  ).join('');
  return `
  <div class="card-wrap">
    <div class="card-shadow"></div>
    <div class="card ${a.type}">
      <div class="card-top">
        <span class="tk">${esc(a.ticker)}</span>
        <span class="badge b-${a.type}">${TYPE_LABEL[a.type]||a.type}</span>
        ${a.held?'<span class="held">You hold</span>':''}
      </div>
      <div class="reason">${esc(a.reason)}</div>
      ${heads?`<div class="heads">${heads}</div>`:''}
      <div class="paste">${esc(a.paste_block||'')}</div>
      <button class="copy" data-paste="${encodeURIComponent(a.paste_block||'')}">Copy paste-block for Claude</button>
    </div>
  </div>`;
}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Memphis shapes
(function(){
  const layer=document.getElementById('shapes-layer');
  const cols=['#0ab5a8','#1a6ef5','#e8234a','#00a86b','#f5620a','#8b1af5','#f5a623'];
  const svgs=[
    r=>`<svg width="38" height="38"><rect x="4" y="4" width="26" height="26" rx="4" fill="none" stroke="${r}" stroke-width="5"/></svg>`,
    r=>`<svg width="34" height="34"><circle cx="17" cy="17" r="12" fill="${r}" stroke="#15120a" stroke-width="4"/></svg>`,
    r=>`<svg width="50" height="20"><path d="M2 10 Q10 2 18 10 T34 10 T48 10" fill="none" stroke="${r}" stroke-width="5" stroke-linecap="round"/></svg>`,
    r=>`<svg width="36" height="36"><polygon points="18,3 33,31 3,31" fill="none" stroke="${r}" stroke-width="5"/></svg>`,
    r=>`<svg width="34" height="34"><circle cx="17" cy="17" r="13" fill="none" stroke="${r}" stroke-width="4" stroke-dasharray="6 5"/></svg>`,
    r=>`<svg width="32" height="32"><rect x="13" y="3" width="6" height="26" rx="3" fill="${r}"/><rect x="3" y="13" width="26" height="6" rx="3" fill="${r}"/></svg>`,
  ];
  let html='';
  for(let i=0;i<16;i++){
    const c=cols[i%cols.length], s=svgs[i%svgs.length](c);
    const side=i%2?'right':'left', off=4+Math.random()*8;
    const top=80+i*(130+(i%3)*40), rot=(Math.random()*40-20).toFixed(0);
    html+=`<div class="ms" style="top:${top}px;${side}:${off}px;--r:${rot}deg">${s}</div>`;
  }
  layer.innerHTML=html;
  const shapes=[...document.querySelectorAll('.ms')].map((el,i)=>{
    const top=parseFloat(el.style.top)||0;
    return {el,threshold:Math.max(0,top-innerHeight*0.75),delay:(i%4)*80,t:false};
  });
  function check(){const y=scrollY;shapes.forEach((s,i)=>{if(!s.t&&y>=s.threshold){shapes[i].t=true;setTimeout(()=>s.el.classList.add('visible'),s.delay);}});}
  check();addEventListener('scroll',check,{passive:true});
})();

function switchTab(which){
  const m=which==='market';
  document.getElementById('view-market').style.display=m?'block':'none';
  document.getElementById('view-capitol').style.display=m?'none':'block';
  document.getElementById('tab-market').classList.toggle('active',m);
  document.getElementById('tab-capitol').classList.toggle('active',!m);
  if(!m) loadCapitol();
}

let CAPITOL_LOADED=false;
let CAP_TRADES=[];
let CAP_WINDOW='all';   // 'all' | '7d'
const SECTORS=['Energy','Defense','Pharma','Tech','Finance'];
const SECTOR_ABBR={Energy:'ENE',Defense:'DEF',Pharma:'PHA',Tech:'TEC',Finance:'FIN'};

async function loadCapitol(){
  if(CAPITOL_LOADED) return;
  let data;
  try{
    const res=await fetch('capitol.json?t='+Date.now());
    data=await res.json();
  }catch(e){
    document.getElementById('cap-overlaps').innerHTML='<div class="empty">Capitol data not available yet.</div>';
    return;
  }
  CAPITOL_LOADED=true;
  CAP_TRADES=data.trades||[];
  CAP_FLOOR=data.alert_floor||0;
  if(!CAP_TRADES.length){
    document.getElementById('cap-overlaps').innerHTML=
      '<div class="empty">No disclosed trades yet. The nightly sync will populate this.</div>';
    return;
  }
  renderOverlaps();
  renderChartsPanel();
  renderCapList();
}
let CAP_FLOOR=0;

function isBuy(t){return /BUY|PURCHASE/.test(t.type||'');}

// --- Window filter (by filing date) ---
function windowed(){
  if(CAP_WINDOW==='all') return CAP_TRADES;
  const cut=new Date(); cut.setDate(cut.getDate()-7);
  return CAP_TRADES.filter(t=>{
    const d=new Date(t.filing_date||t.trade_date||0);
    return !isNaN(d) && d>=cut;
  });
}

// --- Pinned overlaps section ---
function renderOverlaps(){
  const el=document.getElementById('cap-overlaps');
  const hits=CAP_TRADES.filter(t=>t.overlap);
  let html=`<div class="cap-section-label">⚠ Committee Overlaps${hits.length?` <span class="n">(${hits.length})</span>`:''}</div>`;
  if(!hits.length){
    html+=`<div class="cap-empty">No committee overlaps in the current window. This is normal — a flag appears when a tracked member trades in a sector their committee oversees. (Add names to <b>committees.yaml</b> to widen coverage.)</div>`;
    el.innerHTML=html; return;
  }
  html+=hits.map(ovCard).join('');
  el.innerHTML=html;
}

function ovCard(t){
  const buy=isBuy(t);
  const tk=t.ticker?esc(t.ticker):esc((t.asset||'').slice(0,18)||'—');
  const note=t.overlap.committee_note?`<div class="ov-note">↳ ${esc(t.overlap.committee_note)}</div>`:'';
  return `
  <div class="ov-card-wrap">
    <div class="ov-card-shadow"></div>
    <div class="ov-card">
      <div class="ov-top">
        <span class="ov-sector">${esc(t.overlap.sector)} overlap</span>
        <span class="ov-side ${buy?'buy':'sell'}">${buy?'BUY':'SELL'}</span>
        <span class="ov-tk">${tk}</span>
      </div>
      <div class="ov-pol">${esc(t.politician)} <span class="ch">${esc(t.chamber)}</span></div>
      <div class="ov-sub">${esc(t.amount||'')} · traded ${esc(t.trade_date||'?')} · filed ${esc(t.filing_date||'?')}</div>
      ${note}
    </div>
  </div>`;
}

// --- Collapsible charts panel ---
function renderChartsPanel(){
  const el=document.getElementById('cap-charts');
  el.innerHTML=`
    <button class="charts-toggle" id="chartsToggle">
      📊 Sector Charts <span class="chev">▶</span>
    </button>
    <div class="charts-panel" id="chartsPanel">
      <div class="win-toggle">
        <button class="win-btn${CAP_WINDOW==='7d'?' active':''}" data-win="7d">Last 7 days</button>
        <button class="win-btn${CAP_WINDOW==='all'?' active':''}" data-win="all">All recent</button>
      </div>
      <div class="charts-row">
        <div class="chart-box">
          <div class="chart-title">Sector Clustering</div>
          <div class="chart-sub" id="clusterSub"></div>
          <div id="clusterChart"></div>
          <div class="chart-legend">
            <span><i style="background:var(--accent)"></i>Trades</span>
            <span><i style="background:var(--catalyst)"></i>Committee overlap</span>
          </div>
        </div>
        <div class="chart-box">
          <div class="chart-title">Net Pressure</div>
          <div class="chart-sub">Buys vs sells, by trade count</div>
          <div id="pressureChart"></div>
          <div class="chart-legend">
            <span><i style="background:#00a86b"></i>Buys</span>
            <span><i style="background:#e8234a"></i>Sells</span>
          </div>
        </div>
      </div>
    </div>`;
  const toggle=document.getElementById('chartsToggle');
  const panel=document.getElementById('chartsPanel');
  toggle.onclick=()=>{
    const open=panel.classList.toggle('open');
    toggle.classList.toggle('open',open);
    if(open) drawCharts();
  };
  el.querySelectorAll('.win-btn').forEach(b=>{
    b.onclick=()=>{
      CAP_WINDOW=b.dataset.win;
      el.querySelectorAll('.win-btn').forEach(x=>x.classList.toggle('active',x===b));
      drawCharts();
    };
  });
}

function sectorStats(){
  const data=windowed();
  const s={};
  SECTORS.forEach(k=>s[k]={total:0,overlap:0,buys:0,sells:0,dollars:0});
  data.forEach(t=>{
    const sec=t.sector;
    if(!sec||!s[sec]) return;
    s[sec].total++;
    if(t.overlap) s[sec].overlap++;
    if(isBuy(t)) s[sec].buys++; else s[sec].sells++;
    s[sec].dollars+=Number(t.amount_floor||0);
  });
  return s;
}

function drawCharts(){
  const s=sectorStats();
  const active=SECTORS.filter(k=>s[k].total>0);
  const totalDollars=SECTORS.reduce((a,k)=>a+s[k].dollars,0);
  document.getElementById('clusterSub').textContent=
    totalDollars>0?`Min disclosed ≈ $${(totalDollars/1000).toFixed(0)}k (est.)`:'By trade count';

  // Chart 1: vertical stacked bars (teal base + orange overlap)
  const c1=document.getElementById('clusterChart');
  if(!active.length){ c1.innerHTML='<div class="chart-empty">No classified sectors in this window.</div>'; }
  else{
    const maxT=Math.max(...active.map(k=>s[k].total),1);
    c1.innerHTML=vbars(active.map(k=>({
      label:SECTOR_ABBR[k],
      segs:[{v:s[k].total-s[k].overlap,c:'var(--accent)'},{v:s[k].overlap,c:'var(--catalyst)'}],
      top:s[k].total
    })),maxT);
  }

  // Chart 2: diverging vertical bars (buys up green / sells down red)
  const c2=document.getElementById('pressureChart');
  if(!active.length){ c2.innerHTML='<div class="chart-empty">No classified sectors in this window.</div>'; }
  else{
    const maxP=Math.max(...active.map(k=>Math.max(s[k].buys,s[k].sells)),1);
    c2.innerHTML=diverging(active.map(k=>({
      label:SECTOR_ABBR[k],up:s[k].buys,down:s[k].sells
    })),maxP);
  }
}

// Vertical stacked bar chart (SVG). rows:[{label,segs:[{v,c}],top}], maxV
function vbars(rows,maxV){
  const W=240,H=150,padB=22,padT=14,gap=10;
  const n=rows.length, bw=(W-gap*(n+1))/n, scale=(H-padB-padT)/maxV;
  let bars='';
  rows.forEach((r,i)=>{
    const x=gap+i*(bw+gap);
    let y=H-padB;
    r.segs.forEach(seg=>{
      if(seg.v<=0) return;
      const h=seg.v*scale;
      y-=h;
      bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" fill="${seg.c}" stroke="#15120a" stroke-width="2" rx="2"/>`;
    });
    bars+=`<text x="${x+bw/2}" y="${H-padB+14}" text-anchor="middle" font-size="11" font-weight="800" fill="#5a5040" font-family="Nunito Sans">${r.label}</text>`;
    if(r.top>0) bars+=`<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="11" font-weight="900" fill="#15120a" font-family="Nunito">${r.top}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${gap-2}" y1="${H-padB}" x2="${W-gap+2}" y2="${H-padB}" stroke="#b8ae9e" stroke-width="2"/>${bars}</svg>`;
}

// Diverging vertical bars: buys up (green), sells down (red), zero line mid.
function diverging(rows,maxV){
  const W=240,H=150,padX=10,gap=10,mid=H/2;
  const n=rows.length, bw=(W-gap*(n+1))/n, half=(H/2)-14, scale=half/maxV;
  let bars='';
  rows.forEach((r,i)=>{
    const x=gap+i*(bw+gap);
    if(r.up>0){const h=r.up*scale; bars+=`<rect x="${x}" y="${mid-h}" width="${bw}" height="${h}" fill="#00a86b" stroke="#15120a" stroke-width="2" rx="2"/>`;
      bars+=`<text x="${x+bw/2}" y="${mid-h-3}" text-anchor="middle" font-size="10" font-weight="900" fill="#00a86b" font-family="Nunito">${r.up}</text>`;}
    if(r.down>0){const h=r.down*scale; bars+=`<rect x="${x}" y="${mid}" width="${bw}" height="${h}" fill="#e8234a" stroke="#15120a" stroke-width="2" rx="2"/>`;
      bars+=`<text x="${x+bw/2}" y="${mid+h+11}" text-anchor="middle" font-size="10" font-weight="900" fill="#e8234a" font-family="Nunito">${r.down}</text>`;}
    bars+=`<text x="${x+bw/2}" y="${H-2}" text-anchor="middle" font-size="11" font-weight="800" fill="#5a5040" font-family="Nunito Sans">${r.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padX-2}" y1="${mid}" x2="${W-padX+2}" y2="${mid}" stroke="#b8ae9e" stroke-width="2"/>${bars}</svg>`;
}

// --- Full list (cleaned up) ---
function renderCapList(){
  const el=document.getElementById('cap-list');
  const floorTxt=`<div class="cap-floor">Discord pings on $${CAP_FLOOR.toLocaleString()}+, spotlight names, or ⚠ committee overlaps</div>`;
  el.innerHTML=`<div class="cap-section-label">All Disclosed Trades</div>`+floorTxt+CAP_TRADES.map(capRow).join('');
}

function capRow(t){
  const buy=isBuy(t);
  const cls=buy?'buy':'sell';
  const label=buy?'BUY':'SELL';
  const tk=t.ticker?esc(t.ticker):esc((t.asset||'').slice(0,16)||'—');
  const px=t.price?` · $${Number(t.price).toFixed(2)}`:'';
  const ov=t.overlap;
  const flag=ov?`<div><span class="cap-flag">⚠ ${esc(ov.sector)} overlap</span></div>`
    +(ov.committee_note?`<div class="cap-flag-note">↳ ${esc(ov.committee_note)}</div>`:''):'';
  return `
    <div class="cap-row ${cls}${ov?' flagged':''}">
      <div class="cap-main">
        <div class="cap-pol">${esc(t.politician)} <span style="font-weight:600;color:var(--text-dim);font-size:11px">${esc(t.chamber)}</span></div>
        <div class="cap-sub">${esc(t.amount||'')} · traded ${esc(t.trade_date||'?')} · filed ${esc(t.filing_date||'?')}${px}</div>
        ${flag}
      </div>
      <div class="cap-tk">${tk}<small class="${cls}">${label}</small></div>
    </div>`;
}

load();
setInterval(load, 5*60*1000);
</script>
