<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15120a">
<title>Forkball Signals</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf8f0; --surface:#fffef9; --border:#ddd5c5; --border-dark:#b8ae9e;
  --text:#15120a; --text-muted:#5a5040; --text-dim:#a09080; --header-bg:#15120a;
  --accent:#0ab5a8; --accent-light:#d0f7f5;
  --move:#1a6ef5; --move-light:#dce9ff;
  --catalyst:#f5620a; --catalyst-light:#ffe0d0;
  --level:#8b1af5; --level-light:#eddcff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito Sans',sans-serif;font-weight:600;color:var(--text);
  background-color:var(--bg);
  background-image:radial-gradient(circle,#c4bdb0 1.5px,transparent 1.5px);
  background-size:20px 20px;background-attachment:fixed;
  -webkit-font-smoothing:antialiased;padding-bottom:50px;
}
#shapes-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.ms{position:absolute;opacity:0;transform:scale(0.4) rotate(var(--r,0deg));
  transition:opacity .45s cubic-bezier(.34,1.56,.64,1),transform .45s cubic-bezier(.34,1.56,.64,1);}
.ms.visible{opacity:1;transform:scale(1) rotate(var(--r,0deg));}

.header{position:sticky;top:0;z-index:100;background:var(--header-bg);
  border-bottom:6px solid var(--accent);padding:14px 20px 12px;}
.logo{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--accent);line-height:1;}
.logo span{color:#fff;font-weight:400;}
.sub{color:var(--text-dim);font-size:12px;font-weight:700;margin-top:4px;
  text-transform:uppercase;letter-spacing:.5px;}

.main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:18px 16px;}

.qbar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;}
.quote{flex:0 0 auto;background:var(--surface);border:2px solid var(--border);
  border-radius:11px;padding:6px 11px;font-size:12px;font-weight:800;white-space:nowrap;}
.quote .up{color:#00a86b;} .quote .down{color:#e8234a;}

.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn{border-radius:11px;font-family:'Nunito Sans',sans-serif;font-weight:800;
  border:2px solid var(--border-dark);background:var(--surface);color:var(--text);
  padding:7px 13px;font-size:13px;cursor:pointer;}
.btn.active{background:var(--accent);border-color:var(--accent);color:#063d39;}

.card-wrap{position:relative;margin-bottom:16px;}
.card-shadow{position:absolute;top:5px;left:5px;right:-5px;bottom:-5px;
  background:var(--border-dark);border-radius:16px;z-index:0;}
.card{position:relative;z-index:1;background:var(--surface);
  border:2.5px solid var(--border);border-left-width:7px;border-radius:16px;
  padding:14px 15px;transition:transform .15s cubic-bezier(.34,1.56,.64,1);}
.card:hover{transform:translate(-2px,-2px);}
.card.move{border-left-color:var(--move);}
.card.catalyst{border-left-color:var(--catalyst);}
.card.level{border-left-color:var(--level);}

.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.tk{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;}
.badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;
  text-transform:uppercase;letter-spacing:.5px;}
.b-move{background:var(--move-light);color:var(--move);}
.b-catalyst{background:var(--catalyst-light);color:var(--catalyst);}
.b-level{background:var(--level-light);color:var(--level);}
.held{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;
  background:var(--accent-light);color:var(--accent);text-transform:uppercase;letter-spacing:.5px;}
.reason{font-size:14px;line-height:1.4;color:var(--text);margin-bottom:10px;}

.heads{margin:8px 0;}
.heads a{display:block;font-size:12px;color:var(--text-muted);text-decoration:none;
  padding:3px 0;line-height:1.35;border-bottom:1px solid var(--border);}
.heads a:last-child{border-bottom:none;}
.heads a:hover{color:var(--accent);}
.src{font-weight:800;color:var(--text-dim);font-size:10px;text-transform:uppercase;}

.paste{background:var(--header-bg);color:#e8e2d4;border-radius:11px;
  padding:11px 12px;font-family:ui-monospace,Menlo,monospace;font-size:11px;
  line-height:1.5;white-space:pre-wrap;word-break:break-word;margin-top:8px;
  max-height:160px;overflow:auto;}
.copy{margin-top:8px;width:100%;border-radius:11px;border:2px solid var(--accent);
  background:var(--accent);color:#063d39;font-family:'Nunito Sans',sans-serif;
  font-weight:800;font-size:14px;padding:9px;cursor:pointer;}
.copy.done{background:#00a86b;border-color:#00a86b;color:#fff;}

.empty{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:15px;}
</style>
</head>
<body>
<div id="shapes-layer" aria-hidden="true"></div>

<div class="header">
  <div class="logo">FORKBALL <span>Signals</span></div>
  <div class="sub" id="subline">Loading…</div>
</div>

<div class="main">
  <div class="qbar" id="qbar"></div>
  <div class="controls" id="controls"></div>
  <div id="feed"></div>
</div>

<script>
const TYPE_LABEL = {move:'Price Move', catalyst:'Catalyst', level:'Level Cross'};
let HISTORY = [];
let scanIndex = 0;

async function load(){
  try{
    const res = await fetch('recommendations.json?t=' + Date.now());
    HISTORY = (await res.json()).history || [];
  }catch(e){
    document.getElementById('subline').textContent = 'No scans yet';
    document.getElementById('feed').innerHTML =
      '<div class="empty">No scans have run yet. Once the GitHub Action fires, alerts appear here.</div>';
    return;
  }
  if(!HISTORY.length){
    document.getElementById('subline').textContent = 'No scans yet';
    document.getElementById('feed').innerHTML =
      '<div class="empty">No scans recorded yet.</div>';
    return;
  }
  buildControls(); render();
}

function buildControls(){
  const c = document.getElementById('controls'); c.innerHTML='';
  HISTORY.slice(0,6).forEach((scan,i)=>{
    const b=document.createElement('button');
    b.className='btn'+(i===scanIndex?' active':'');
    const t=new Date(scan.generated_at);
    const n=(scan.alerts||[]).length;
    b.textContent = (i===0?'Latest':t.toLocaleString([],{month:'numeric',day:'numeric',hour:'numeric',minute:'2-digit'})) + (n?` (${n})`:'');
    b.onclick=()=>{scanIndex=i;buildControls();render();};
    c.appendChild(b);
  });
}

function render(){
  const scan=HISTORY[scanIndex];
  const t=new Date(scan.generated_at);
  document.getElementById('subline').textContent =
    t.toLocaleString([],{weekday:'short',hour:'numeric',minute:'2-digit'})+' ET scan';

  const qbar=document.getElementById('qbar'); qbar.innerHTML='';
  Object.values(scan.quotes||{}).forEach(q=>{
    const pct=q.percent==null?'':`<span class="${q.percent>=0?'up':'down'}">${q.percent>=0?'+':''}${q.percent.toFixed(2)}%</span>`;
    const el=document.createElement('div'); el.className='quote';
    el.innerHTML=`${q.ticker} $${(q.price||0).toFixed(2)} ${pct}`;
    qbar.appendChild(el);
  });

  const feed=document.getElementById('feed');
  const alerts=scan.alerts||[];
  if(!alerts.length){
    feed.innerHTML='<div class="empty">Quiet scan — nothing tripped a rule. Quotes above are current.</div>';
    return;
  }
  feed.innerHTML=alerts.map(cardHTML).join('');
  // wire copy buttons
  document.querySelectorAll('.copy').forEach(btn=>{
    btn.onclick=()=>{
      const txt=decodeURIComponent(btn.dataset.paste);
      navigator.clipboard.writeText(txt).then(()=>{
        btn.textContent='✓ Copied — paste into Claude';
        btn.classList.add('done');
        setTimeout(()=>{btn.textContent='Copy paste-block for Claude';btn.classList.remove('done');},2500);
      });
    };
  });
}

function cardHTML(a){
  const heads=(a.headlines||[]).map(h=>
    `<a href="${esc(h.url||'#')}" target="_blank" rel="noopener"><span class="src">${esc(h.source||'')}</span> ${esc(h.headline||'')}</a>`
  ).join('');
  return `
  <div class="card-wrap">
    <div class="card-shadow"></div>
    <div class="card ${a.type}">
      <div class="card-top">
        <span class="tk">${esc(a.ticker)}</span>
        <span class="badge b-${a.type}">${TYPE_LABEL[a.type]||a.type}</span>
        ${a.held?'<span class="held">You hold</span>':''}
      </div>
      <div class="reason">${esc(a.reason)}</div>
      ${heads?`<div class="heads">${heads}</div>`:''}
      <div class="paste">${esc(a.paste_block||'')}</div>
      <button class="copy" data-paste="${encodeURIComponent(a.paste_block||'')}">Copy paste-block for Claude</button>
    </div>
  </div>`;
}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Memphis shapes
(function(){
  const layer=document.getElementById('shapes-layer');
  const cols=['#0ab5a8','#1a6ef5','#e8234a','#00a86b','#f5620a','#8b1af5','#f5a623'];
  const svgs=[
    r=>`<svg width="38" height="38"><rect x="4" y="4" width="26" height="26" rx="4" fill="none" stroke="${r}" stroke-width="5"/></svg>`,
    r=>`<svg width="34" height="34"><circle cx="17" cy="17" r="12" fill="${r}" stroke="#15120a" stroke-width="4"/></svg>`,
    r=>`<svg width="50" height="20"><path d="M2 10 Q10 2 18 10 T34 10 T48 10" fill="none" stroke="${r}" stroke-width="5" stroke-linecap="round"/></svg>`,
    r=>`<svg width="36" height="36"><polygon points="18,3 33,31 3,31" fill="none" stroke="${r}" stroke-width="5"/></svg>`,
    r=>`<svg width="34" height="34"><circle cx="17" cy="17" r="13" fill="none" stroke="${r}" stroke-width="4" stroke-dasharray="6 5"/></svg>`,
    r=>`<svg width="32" height="32"><rect x="13" y="3" width="6" height="26" rx="3" fill="${r}"/><rect x="3" y="13" width="26" height="6" rx="3" fill="${r}"/></svg>`,
  ];
  let html='';
  for(let i=0;i<16;i++){
    const c=cols[i%cols.length], s=svgs[i%svgs.length](c);
    const side=i%2?'right':'left', off=4+Math.random()*8;
    const top=80+i*(130+(i%3)*40), rot=(Math.random()*40-20).toFixed(0);
    html+=`<div class="ms" style="top:${top}px;${side}:${off}px;--r:${rot}deg">${s}</div>`;
  }
  layer.innerHTML=html;
  const shapes=[...document.querySelectorAll('.ms')].map((el,i)=>{
    const top=parseFloat(el.style.top)||0;
    return {el,threshold:Math.max(0,top-innerHeight*0.75),delay:(i%4)*80,t:false};
  });
  function check(){const y=scrollY;shapes.forEach((s,i)=>{if(!s.t&&y>=s.threshold){shapes[i].t=true;setTimeout(()=>s.el.classList.add('visible'),s.delay);}});}
  check();addEventListener('scroll',check,{passive:true});
})();

load();
setInterval(load, 5*60*1000);
</script>
</body>
</html>
