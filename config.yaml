# ============================================================
# Forkball Signals — config
# Edit this to control what the scanner watches and what trips an alert.
# No AI, no tokens on the scanner. Only Finnhub/Discord keys in GitHub Secrets.
# ============================================================

# --- Positions you hold (watched closely; can set level alerts) ---
# account: etrade (taxable) | merrill (IRA) | espp (Apple plan)
# type: shares | call | put
# tag: core = long-term quality | swing = short-term/speculative | watch = neutral
# Optional: alert_above / alert_below to ping when price crosses a level.
# Optional: move_threshold to override the global default for this position only.
positions:
  # --- Merrill IRA (long-term core) ---
  - ticker: IVV
    account: merrill
    type: shares
    tag: core
    note: "S&P 500 ETF, long-term IRA core"
    move_threshold: 1.0   # tighter — even a 1% move is notable for this

  # --- ESPP (Apple plan, partially vested) ---
  - ticker: AAPL
    account: espp
    type: shares
    tag: core
    note: "Apple ESPP, partially vested — treat as long-term core"
    move_threshold: 1.5

  # --- E*Trade taxable brokerage ---
  - ticker: SPGI
    account: etrade
    type: shares
    tag: core
    note: "S&P Global — financial data/ratings, long-term hold"
    move_threshold: 1.5

  - ticker: CRSP
    account: etrade
    type: shares
    tag: swing
    note: "CRISPR Therapeutics — gene editing, speculative biotech"
    move_threshold: 3.0   # biotech swings hard, skip normal chop

  - ticker: CHWY
    account: etrade
    type: shares
    tag: watch
    note: "Chewy — personal interest, small position"
    move_threshold: 3.0

  - ticker: DKNG
    account: etrade
    type: shares
    tag: swing
    note: "DraftKings — underwater, watching for recovery or exit"
    move_threshold: 3.0

  - ticker: GME
    account: etrade
    type: shares
    tag: swing
    note: "GameStop — meme, hold and watch"
    move_threshold: 5.0   # daily GME chop is noise; only ping big moves

  - ticker: HYSR
    account: etrade
    type: shares
    tag: watch
    note: "HydrogenPro — penny stock, minimal $"
    move_threshold: 8.0   # penny stocks move wildly; only ping huge moves

  - ticker: SNDL
    account: etrade
    type: shares
    tag: watch
    note: "SNDL — cannabis micro-cap, minimal $"
    move_threshold: 8.0


# --- Watchlist: scanned for moves + catalysts even if not held ---
# Tags frame how the daily brief discusses each name:
#   core  = long-term quality; a selloff may be a discount for the IRA
#   swing = short-term / momentum; treat moves as trade setups
#   watch = neutral; just keep an eye on it
watchlist:
  # Broad market — always watch
  - SPY
  - {ticker: QQQ, tag: watch}

  # AI / chips — high-conviction theme
  - {ticker: NVDA, tag: swing}
  - {ticker: AMD,  tag: swing}
  - {ticker: MSFT, tag: core}
  - {ticker: TSM,  tag: core}    # Taiwan Semi — backbone of chip supply chain

  # Biotech — sector you want more of
  - {ticker: XBI,  tag: core}    # Biotech ETF — broad sector exposure, IRA-friendly
  - {ticker: EDIT, tag: swing}   # Editas Medicine — gene editing peer to CRSP
  - {ticker: BEAM, tag: swing}   # Beam Therapeutics — base editing, CRSP adjacent
  - {ticker: MRNA, tag: watch}   # Moderna — larger biotech, mRNA platform

  # Names you root for / interested in
  - {ticker: NTDOY, tag: watch}  # Nintendo ADR — Switch 2 launch is live catalyst

  # Quality names worth watching for IRA discount opportunities
  - {ticker: GOOGL, tag: core}
  - {ticker: AMZN,  tag: core}


# --- Catalyst hunting: market-moving events that trip an intraday alert ---
# Multi-word phrases cut noise vs single keywords.
catalyst_themes:
  - keywords: ["Federal Reserve", "FOMC", "rate cut", "rate hike", "Jerome Powell"]
    relevant_tickers: ["SPY", "QQQ", "IVV", "AAPL", "MSFT"]
    note: "Fed / monetary policy"

  - keywords: ["CPI", "inflation report", "jobs report", "nonfarm payrolls", "unemployment rate"]
    relevant_tickers: ["SPY", "QQQ", "IVV"]
    note: "key economic data"

  - keywords: ["tariff", "trade war", "trade deal", "trade agreement"]
    relevant_tickers: ["SPY", "QQQ", "TSM", "AAPL"]
    note: "trade / tariffs"

  - keywords: ["FDA approval", "FDA approved", "clinical trial", "phase 3", "IND application"]
    relevant_tickers: ["CRSP", "EDIT", "BEAM", "MRNA", "XBI"]
    note: "biotech / FDA catalysts"

  - keywords: ["artificial intelligence", "AI chip", "Nvidia", "semiconductor", "GPU"]
    relevant_tickers: ["NVDA", "AMD", "TSM", "MSFT"]
    note: "AI / chips"

  - keywords: ["Nintendo", "Switch 2", "gaming revenue", "DraftKings", "sports betting"]
    relevant_tickers: ["NTDOY", "DKNG"]
    note: "gaming / sports betting"


# --- Scan behavior ---
settings:
  # Default move threshold (%) if no per-ticker or per-position override exists.
  move_threshold_pct: 2.0
  # Per-ticker overrides for watchlist names (positions use move_threshold above).
  thresholds:
    SPY:   1.0
    QQQ:   1.5
    MSFT:  1.5
    GOOGL: 1.5
    AMZN:  1.5
    TSM:   2.0
    NVDA:  4.0   # high-beta — skip normal daily chop
    AMD:   4.0
    NTDOY: 3.0
    XBI:   2.0
    EDIT:  5.0   # small-cap biotech swings hard
    BEAM:  5.0
    MRNA:  3.0
  # Skip scans when the US market is closed.
  market_hours_only: true


# ============================================================
# Capitol Trades tracker (separate nightly job, capitol.py)
# Data: Financial Modeling Prep (FMP) free tier — needs FMP_API_KEY secret.
# STOCK Act filings can lag up to 45 days after the actual trade.
# This tracks NEWLY DISCLOSED trades, not real-time activity.
# ============================================================
capitol:
  track_house: true
  track_senate: true
  alert_min_amount: 50000
  spotlight_politicians:
    - "Pelosi"
    - "Olszewski"
  lookback_days: 14
