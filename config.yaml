# ============================================================
# Forkball Signals — config (ZERO-COST version)
# Edit this to control what the scanner watches and what trips an alert.
# No AI, no tokens. Only Finnhub/Telegram keys live in GitHub Secrets.
# ============================================================

# --- Positions you hold (watched closely; can set level alerts) ---
# account: robinhood (taxable) | merrill (IRA)
# type: shares | call | put
# Optional: alert_above / alert_below to ping when price crosses a level.
positions:
  - ticker: IVV
    account: merrill
    type: shares
    note: "long-term core"
  - ticker: QQQ
    account: merrill
    type: shares
    note: "long-term core"
    # alert_below: 500     # uncomment to get pinged if QQQ drops under 500
    # move_threshold: 1.5  # this position alerts on a smaller move than the default
  # Example options position with a level alert:
  # - ticker: USO
  #   account: robinhood
  #   type: put
  #   strike: 72
  #   expiry: 2026-06-19
  #   alert_below: 70
  #   note: "Iran/oil rubber-band play"

# --- Watchlist: scanned for moves + catalysts even if not held ---
# Two ways to list a ticker:
#   1. Just the symbol (simple):            - SPY
#   2. Symbol with an intent tag (richer):  - {ticker: ADBE, tag: watch}
# Tags are only used by the DAILY BRIEF to frame its read. Options:
#   core  = long-term quality; a selloff may be a discount for the IRA
#   swing = short-term / momentum / lotto; treat moves as trade setups
#   watch = neutral; just keep an eye on it
# Untagged tickers are treated as "watch".
watchlist:
  - SPY
  - QQQ
  - {ticker: NVDA, tag: swing}
  - {ticker: ADBE, tag: core}
  # Add your own, e.g.:
  # - {ticker: PLTR, tag: swing}
  # - {ticker: GOOGL, tag: core}

# --- Catalyst hunting: BROAD market-moving events only ---
# Kept deliberately narrow to high-impact, whole-market catalysts so the
# intraday scanner doesn't spam on routine sector chatter. Day-to-day "why did
# X move" analysis is the daily brief's job, not the keyword scanner's.
catalyst_themes:
  - keywords: ["Federal Reserve", "FOMC", "rate cut", "rate hike", "Powell"]
    relevant_tickers: ["SPY", "QQQ", "IVV"]
    note: "Fed / monetary policy"
  - keywords: ["CPI", "inflation report", "jobs report", "nonfarm payrolls", "unemployment rate"]
    relevant_tickers: ["SPY", "QQQ"]
    note: "key economic data"
  - keywords: ["tariff", "trade war", "trade deal"]
    relevant_tickers: ["SPY", "QQQ"]
    note: "trade / tariffs"

# --- Scan behavior ---
settings:
  # Default: a ticker moving at least this % (up or down) triggers a "move" alert.
  move_threshold_pct: 2.0
  # Per-ticker overrides. Tighter for calm core holds, looser for volatile names.
  # Resolution order: a position's own move_threshold > this map > the default above.
  thresholds:
    IVV: 1.0    # core hold — even a 1% move is worth a look
    QQQ: 1.5
    NVDA: 4.0   # high-beta — ignore normal daily chop, only flag big moves
  # Skip scans when US market is closed (ET hours).
  market_hours_only: true

# ============================================================
# Capitol Trades tracker (separate nightly job, capitol.py)
# Data: Financial Modeling Prep (FMP) free tier — needs FMP_API_KEY secret.
# Covers House + Senate "latest disclosures" feeds with real filing dates.
# By law these are STOCK Act disclosures and can lag up to 45 days after the
# actual trade — this tracks NEWLY DISCLOSED trades, not real-time activity.
# ============================================================
capitol:
  # Track both chambers. Set either to false to skip it.
  track_house: true
  track_senate: true
  # The dashboard shows ALL disclosed trades. Discord only pings for trades
  # whose minimum disclosed dollar amount is at least this floor. This keeps
  # the channel signal-only while the dashboard keeps the full firehose.
  # Set to 0 to ping on literally every disclosed trade (very noisy).
  alert_min_amount: 50000
  # Optional: spotlight specific names — these always ping regardless of the
  # dollar floor (e.g. high-profile traders or your own representative).
  # Leave empty [] to rely on the dollar floor alone.
  spotlight_politicians:
    - "Pelosi"
    - "Olszewski"
  # How many days back to consider a filing "new" on first run / catch-up.
  lookback_days: 14
  detect_committee_overlap: true
  alert_on_overlap: true
