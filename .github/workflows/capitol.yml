name: Forkball Capitol Trades

on:
  schedule:
    # Nightly at ~6:10 AM UTC (~1-2 AM ET). Disclosures trickle in daily;
    # once a day is plenty given the 45-day legal filing lag.
    - cron: '10 6 * * *'
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  capitol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Sync capitol trades
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          CAPITOL_WEBHOOK: ${{ secrets.CAPITOL_WEBHOOK }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python capitol.py

      - name: Commit results
        run: |
          git config user.name  "forkball-bot"
          git config user.email "actions@github.com"
          # Tolerate either file not existing yet (e.g. first run, or a feed
          # outage that made the script early-return before writing them).
          git add docs/capitol.json docs/capitol_seen.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "capitol: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
